name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Multi-platform build + test matrix
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows x64 (MSVC)"
            os: windows-latest
            cmake_generator: "Visual Studio 17 2022"
            cmake_arch: "-A x64"
            artifact_name: windows-x64

          - name: "macOS arm64 (Apple Clang)"
            os: macos-14
            cmake_generator: "Xcode"
            cmake_arch: ""
            artifact_name: macos-arm64

          - name: "macOS x64 (Apple Clang)"
            os: macos-13
            cmake_generator: "Xcode"
            cmake_arch: ""
            artifact_name: macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: (macOS) Select Xcode
        if: runner.os == 'macOS'
        run: sudo xcode-select --switch /Applications/Xcode.app

      # Cache JUCE + dependency downloads to cut ~3 min off cold builds
      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.artifact_name }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-${{ matrix.artifact_name }}-

      - name: Configure CMake
        run: |
          cmake -B build \
            -G "${{ matrix.cmake_generator }}" \
            ${{ matrix.cmake_arch }} \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DAGENTVST_BUILD_EXAMPLES=ON \
            -DAGENTVST_BUILD_TESTS=ON

      - name: Build (framework + tests + examples)
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

      - name: Run unit + integration tests
        working-directory: build
        run: ctest --build-config ${{ env.CMAKE_BUILD_TYPE }} --output-on-failure --parallel 4

      - name: Upload VST3/AU artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: plugins-${{ matrix.artifact_name }}-${{ github.sha }}
          path: |
            build/**/*.vst3
            build/**/*.component
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.artifact_name }}-${{ github.sha }}
          path: build/Testing/
          if-no-files-found: ignore
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Static analysis — scan agent DSP files for prohibited real-time patterns
  # ─────────────────────────────────────────────────────────────────────────────
  lint-dsp:
    name: Lint Agent DSP Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for prohibited real-time patterns
        shell: bash
        run: |
          echo "=== Scanning agent DSP files for real-time violations ==="
          FAIL=0
          # Only scan files in examples/ that end in DSP*.cpp
          mapfile -d '' DSP_FILES < <(find examples -name "*DSP*.cpp" -print0 2>/dev/null)

          if [ ${#DSP_FILES[@]} -eq 0 ]; then
            echo "No DSP files found to scan."
            exit 0
          fi

          PATTERNS=(
            " new "         # heap allocation
            "malloc("       # heap allocation
            "calloc("       # heap allocation
            "realloc("      # heap allocation
            "std::vector"   # dynamic container (may reallocate)
            "std::map "     # dynamic container
            "std::unordered_map " # dynamic container
            "std::cout"     # console I/O (system call)
            "printf("       # console I/O
            "std::mutex"    # blocking synchronization
            "std::unique_lock" # blocking synchronization
            "std::lock_guard"  # blocking synchronization
          )

          for file in "${DSP_FILES[@]}"; do
            echo "Checking: $file"
            for pattern in "${PATTERNS[@]}"; do
              if grep -n "$pattern" "$file"; then
                echo "::error file=$file::Prohibited real-time pattern: '$pattern'"
                FAIL=1
              fi
            done
          done

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Agent DSP code contains prohibited real-time patterns. See above."
            exit 1
          fi
          echo "All DSP files clean."

  # ─────────────────────────────────────────────────────────────────────────────
  # Release — runs only on version tags (e.g. v1.0.0)
  # Builds Release artefacts for all platforms and creates a GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Release ${{ github.ref_name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-and-test, lint-dsp ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
          - os: macos-14
            artifact_name: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-release-${{ matrix.artifact_name }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-release-${{ matrix.artifact_name }}-

      - name: Configure (Release)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DAGENTVST_BUILD_EXAMPLES=ON \
            -DAGENTVST_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package plugins
        shell: bash
        run: |
          mkdir -p dist
          find build -name "*.vst3" -o -name "*.component" | while read f; do
            cp -r "$f" dist/
          done
          ls dist/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}-${{ github.ref_name }}
          path: dist/
          retention-days: 90

      - name: Create GitHub Release
        if: matrix.artifact_name == 'windows-x64'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
